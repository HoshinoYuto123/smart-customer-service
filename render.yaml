services:
  - type: web
    name: scs-agent
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_MODE
        value: "demo"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SKIP_EMBEDDING_MODEL
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.9"
